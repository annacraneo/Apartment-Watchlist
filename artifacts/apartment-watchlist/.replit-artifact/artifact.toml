kind = "web"
previewPath = "/"
title = "Apartment Watchlist"
version = "1.0.0"
id = "artifacts/apartment-watchlist"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19832

[services.development]
run = "pnpm --filter @workspace/apartment-watchlist run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apartment-watchlist", "run", "build" ]
publicDir = "artifacts/apartment-watchlist/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19832"
BASE_PATH = "/"
